<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Patient</h2>

    <form method="POST">

        <label class="form-label">Full Name</label>
        <input type="text"
               name="full_name"
               value="{{ patient.full_name }}"
               class="form-control">

        <br>

        <label class="form-label">DOB</label>
        <input type="date"
               name="dob"
               value="{{ patient.dob }}"
               class="form-control">

        <br>

        <label class="form-label">Email</label>
        <input type="email"
               name="email"
               value="{{ patient.email }}"
               class="form-control">

        <br>

        <label class="form-label">Glucose</label>
        <input type="number"
               name="glucose"
               value="{{ patient.glucose }}"
               class="form-control">

        <br>

        <label class="form-label">Haemoglobin</label>
        <input type="number"
               name="haemoglobin"
               value="{{ patient.haemoglobin }}"
               class="form-control">

        <br>

        <label class="form-label">Cholesterol</label>
        <input type="number"
               name="cholesterol"
               value="{{ patient.cholesterol }}"
               class="form-control">

        <br>

        <button class="btn btn-success">
            Update Patient
        </button>

    </form>

</div>

</body>
</html>
